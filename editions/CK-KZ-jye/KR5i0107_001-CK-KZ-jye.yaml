front:
  text: 太上無極大道三十六部尊經太上無極大道三十六部尊經
  hash: sha256:ded1cb837e386e97f7a79ffd476348e5542e1e7f0ae20d8f656dadc0d2acb9c8
  markers:
  - {type: page-break, offset: 12, content: '', id: CK-EX_KR5i0107_01p001a}
body:
  text: 啟請科儀鳴法鼓二十四通叩齒吸生氣化衣化冠存本身化一枯木借離宮之火焚化烟內結一雞子忽現天師像化身畢提綱云太極分初後三清道在先誰將玄妙測金口與流傳大聖玄元闡教天尊二合竊以清靜自然之道本諸無爲太虛寥廓之鄉烏能有相恍恍惚惚難測諦詮杳杳冥冥罔窺蘊奧倘玄關弗開於俄頃而天機胡見其絲毫八卦霓裳包羅大千世界一粒黍米渾含不二法門三景不明萬象俱𣺌壇有開明眞符謹當告下告開明符大聖開明三景天尊二合所謂道氣聚陰陽判天開日月明三清揚大道萬彚荷生成道場眾等同聲讚詠太極圖中大道全上清眞境具先天三塗五苦免煩惱十極羣仙悟諦詮六賊驅除消俗慮部曹接引遇奇緣尊居金闕高無際經演遺流億萬年大聖流演聖教天尊二合三清德相難盡讚揚開壇眞符謹當告下告開壇符臣聞五方五帝之炁胥本太極而生三清三境之眞皆由元始所化道高無際德大難名巍巍金闕之尊𣺌𣺌玉京之聖洋洋乎神機罔測蕩蕩乎妙用難窺炁則不偏精爲甚固入水不溺入火不焚第以四隅亦稟天地之靈十方皆具陰陽之炁邪意起則正法壞客念滅則大道伸五蘊未空終歸魔障六根不去仍墮孽緣匪頒元始之靈符難期魔王以敬禮告命魔符大聖降魔護道天尊二合伏念萬聖千眞悉居金樓玉殿之上敢迓蓬門蓽戸之中倘不清靜壇場恐難迎接仙侶特請燄魔羅王朱將軍風輪盪鬼周元帥江河淮海四瀆龍王雷霆一府二院三司五雷官軍將吏諸大靈官土地功曹四值使者里域眞官等神滌除諸般厭穢鑒今蕩穢功德淨天地神咒天地自然穢炁消㪚洞中玄虛晃朗太玄八方威神使我自然靈寶符命普告九天乾羅答那洞罡太玄斬妖縛邪殺鬼萬千中山神咒元始玉文持誦一遍却鬼延年按行五嶽八海知聞魔玉朿首侍衛我軒凶穢消㪚道炁長存急急如律令書令於水碗內徧洒壇中華池五龍水遍灑淨壇庭一切諸厭穢普悉化微塵大聖常清常淨天尊二合琳琅振響十方肅清河海靜默山嶽吞雲威靈振伏招集羣仙天無氛穢地絕妖塵冥慧洞清大量玄玄也步虛三禮無上三天玄元始三炁搯巳午未三搯離五搯坎功曹搯辰戌左搯酉右搯辰香官使者左右龍君搯震虎君搯兌侍香金童搯乾傳言散花玉女搯坤令臣身中三十六人出搯本命出者莊嚴令臣所奏咸賜如言今爲奉聖宣口意道恭焚爐內心香遙望天階敬伸啟請具職誠惶誠恐稽首頓首虔誠上啟三清應化天尊金闕玉皇天尊十方無極天尊三清護法天尊四府眾位神祇經筵有感眞仙恭望洪慈主盟修奉祝香咒心香一瓣普徧十方清烟繚繞透天堂功德大無疆瑞靄壇場眾聖降金光大聖香雲結篆天尊三合祝燭咒蠟炬燦爛放大光明朗如日月照乾坤利益諸眾生普燭幽冥災消福駢臻大聖玉華散彩天尊三合金光咒天地玄宗萬炁本根廣修億劫證吾神通三界內外惟吾獨尊頂有金光覆蔭吾身視之不見聽之不聞包羅天地養育羣生誦持萬遍身有光明三界侍衛五帝司迎萬神朝禮役使雷霆鬼妖喪膽精怪亡形內有霹靂雷神隱名洞慧交徹五炁騰騰金光速現覆護眞人急急如律令開心咒九天大帝身披白衣日月照曜乾坤斡隨有能敬者聰明如斯黃老丹元與念合宜五神衞守八聖護持誦之不輟萬神赴機我司大化光曜生輝心開茅塞祛鈍除迷誦之萬遍文治瓊瑰詞源浩浩筆陣風馳九天開化萬章洞微元皇上令勿稽勿違急急如元皇上帝律令勒淨身咒諸我不淨不淨起我無淨無我諸我自淨以日洗心以月鍊形仙人扶起玉女隨形二十八宿與吾合形千邪萬穢逐水而清靈寶天尊安慰身形弟子魂魄五臟玄冥青龍白虎隊仗紛紜朱雀玄武侍衞我眞淨口咒皇君皇君吐氣成雲令吾淨口持念眞文丹朱口神吐穢除氛舌神正倫通命養神羅千齒神祛邪衛眞喉神虎賁氣神引津心神丹元令我通眞思神鍊液道炁長存淨心咒太上台星應變無停驅邪縛魅保命護身智慧明淨心神安𡨴三魂永久魄無喪傾安位咒元始安鎮普告萬靈嶽瀆眞官土地祇靈左社右稷不得妄驚回向正道內外澄清各安方位備守壇庭太上有命搜捕邪精護法神王保衛帝經皈依大道元亨利貞安土地咒功曹土地神之最靈通天達地出幽入冥爲吾關奏不得留停有功之日名書上清發爐道由心學心假香傳香焚玉爐心存帝前眞靈下盼仙斾臨軒令臣關告徑達九天所祈所願咸賜如言伏以寂然不動感而遂通太音聲希叩之則應恭焚道德眞香虔誠上啟供𠐒致心皈命禮玉清聖境清微天宮鬱羅蕭臺之中森羅淨泓之上現有爲之梵相具無極之神通敷演眞玄破無有色空之礙拯提趣類絕智愚高下之分妙用難窺靈機罔測大悲大願大聖大慈無量度人元始天尊致心皈命禮上清眞境禹餘天宮紫微瓊臺之中玄都玉京之上接元始虛皇之統系超西那玉國之根苗入黍米珠盡挹眞玄之精粹在香林苑屢談秘要之筌蹄妙德難思神通莫擬大悲大願大聖大慈無量度人靈寶天尊致心皈命禮太清仙境大赤天宮巍巍金闕之高𣺌𣺌重宵之上降生於無量數劫說法於萬二千天五千秘言融三才之妙道八十餘度接六趣之眾生聖德崇高玄功廣博大悲大願大聖大慈無量度人降生天尊致心皈命禮太上彌羅無上天妙有玄眞境𣺌𣺌紫金闕太微玉清宮無極無上聖廓落發光明寂寂浩無踪玄範總十方湛寂眞常道恢漠大神通玉皇大天尊玄穹高上帝致心皈命禮驕樂境玉眞慶宮現九十七化之行藏顯億千萬種之神異飛鸞開化於在在如意救劫於生生至孝至仁功存乎儒釋道教不驕不樂職盡乎天地水官功德難量威靈莫測大悲大願大聖大慈九天輔元開化主宰司祿職貢舉眞君七曲靈應保德宏仁大帝談經演教消劫行化更生永命天尊致心皈命禮太上神威英文雄武精忠大義高潔清廉協運皇圖崇德演正掌儒釋道教之權管天地人才之柄上司三十六天星辰雲漢下轄七十二地土壘幽酆秉注生功德延壽丹書執定死罪過奪命黑籍考察諸佛諸神鑒制羣仙羣職高證妙果無量度人至靈至聖至大至尊伏魔大帝關聖帝君大悲大願大聖大慈貞元顯應昭明翊漢天尊致心皈命禮唐朝秀士蓬萊上仙降生於八月之天證道於群仙之會醉岳陽而感應設箕沙以著靈救劫好生垂書濟世煉金丹以活民命功著千秋請玉旨而設講臺澤及萬民身披乾坤道袍手執金玉如意神通廣大聖德崇高大悲大願大聖大慈正一玉虛內相孚佑帝君上上無上度人天尊致心皈命禮羅漢倒裝淨慈坐化動中尋靜菩提果證三千妙裡藏玄如來龕成俄頃處處據關心印時時悉寓禪機西湖留踪南黔顯化一片婆心消浩劫幾番慈舟度眾生善爲調元顯應之功不朽切於勸世慈悲之念常存暗引金針鴛鴦吐秀普降時雨草木回春大開普濟之舟廣施羣黎之澤成佛妙果證道仙階大悲大願大聖大慈救劫無量古佛濟仙禪師調元普濟天尊致心皈命禮興周滅紂輔正除邪三謁碧遊宮中首朝黃金闕內輔三清之上座開萬代之玄功清靜不染紅塵道則高矣虛無常傅白簡功何偉乎時值下元領旨救劫運際末世飛鸞垂書闡秘密於先天啟愚昧於後學不生不滅無我無人大悲大願大聖大慈玉清輔教廣成仙師致心皈命禮養性歸眞修心證道稟乾坤之正炁得天地之精靈太極未分玄機即測道爲無上形具有形之先法本有原爲歸無爲之化陰陽合德水火結形大悲大願大聖大慈校正尊經赤精先師致心皈命禮五行渾合二炁結成兼秉乾坤之靈獨得陰陽之正或有相或無相太虛俱空若有倫若無倫大化莫擬說法於三千世界成道於億萬斯年遍救人民敬領玉清之敕命同回劫運欽承金闕之綸音廣大慈悲普開方便大悲大願大聖大慈龍漢正道雲中仙師致心皈命禮仙天大道無上法師取水火而養丹田鍊陰陽以歸玄苑功成九轉朵朵蓮花齊開果證三千篇篇貝葉胥著妙手拈來皆是道盡心會處即通靈闡道學之蹄筌悟仙機之玄妙神通莫比靈應無方大悲大願大聖大慈淸靜自然玄中大法先師致心皈命禮隱居下僚功成上品識道祖於函谷辭爵位於朝廷心悟五千之言名著丹籍身逃億萬之劫意絕紅塵妙法得聞仙緣有分大道獲遇俗慮胥融瑤池特展聚仙旗金闕因命挽劫運慈悲有在智慧無方大悲大願大聖大慈道德流傳尹喜仙師致心皈命禮斗壇演教桂殿司徒生大定而闡揚黔邦編廣化而顯應番土祈禳心懺在在令人皈依參閱善書般般爲世勸戒六時行道之主教諸生習錄之宗師大洞會心上乘證果大悲大願大聖大慈桂香輔殿司徒金仙贊化貞官致心皈命禮先天主將無上慈王提衡三界神祇糾察人間善惡行風走火落十方外道之魂治病驅邪鑒凡民一誠之懇領三清法旨以蕩除措九地生民於袵席爲瞋爲怒祈求奸慝回心示烈示嚴總屬慈仁莫已洪恩際地大德同天大悲大願大聖大慈雷霆統制萬法主宰神威豁落保世救民雷聲普化天尊致心皈命禮雷部尊神玉樞上将銀牙鳳嘴上三天靑面藍身入九地翅屬風火掃十方外道之妖邪手執銅錘驅三界不祥之鬼祟名留顯應功贊調元督勸化之講堂挽沉溺之世道讚莫能盡功實難名大悲大願大聖大慈調元上將辛大天君十方顯應天尊致心皈命禮湖海寄跡正直居心卜宅於印山著名於潭水施棺木免屍骸之暴露作橋樑濟人民之沉淪恤寡矜孤救難濟急生前有直道之譽死後急上仙之階造調元以成眞開顯應而證果南宫受鍊丹籍書名大悲大願大聖大慈三淸三境䕶法眞人致心皈命禮正直不阿孝友無愧守忠厚之遺訓慕詩禮之良規喜聞善言宣讀頻開廣化敬事神道團圓大鍊金丹厯數劫始歸仙班當下元方證正道遭逢不偶三千年之奇遇非常際會有時四五載之大功弗淺龍顏屢候綸音恒頒爲註淸微之經因成無上之道位居至極名列上仙大悲大願大聖大慈玉淸聖境司經眞人致心皈命禮派演雙井名列三淸厚德開累葉之家聲忠樸守祖宗之遺緒謙謙君子藹藹吉人值貧富而重詩書處富貴而好禮義生享淸福死列仙階皆緣訓子之有方所以證道於不滅金闕頒詔玉旨特封大悲大願大聖大慈上淸眞境司經眞人致心皈命禮生居吳會死鎮黔邦性質本屬温和言行實爲謙厚鑒調元作無量之寶筏開顯應樹不世之奇勳始陞龍泉復救湄水曾費千般苦口以訓及門屢體一片㜑心而挽劫運德則大矣民皆仰之大悲大願大聖大慈太淸仙境司經眞人致心皈命禮降生江右遷移黔中得賢𦙍以紹書香施時雨而囘世運金針大度剌醒無數昏迷寶鏡高懸照徹有生肝膽始司府尹之任顯應無窮繼列天仙之班調元有騐紅塵之緣未斷丹天之鍊非誣德播無疆功乘不朽大悲大願大聖大慈叅閱證果黃林眞人致心皈命禮顯應證道調元贊功墮塵於天順之初鍊神於身謝之後輔助善果後人可蓋前人之愆挽囘天心陽界實貽陰界之福大功旣就超及九玄浩劫能消度諸七祖講樓恒伴以勸世沙筆屢候而囘春得遇奇緣自歸正道大悲大願大聖大慈南宮脫化妙林眞人致心皈命禮黔邦壯士清邑名儒比禮樂以就功名談經史而起愚昧有典有則孝友敦和睦之風無黨無偏詩書遺勤苦之敎守前人之矩矱爲先正之典型祖德流芳安居凱里苗民逆命避難勻陽家人雖有離别之傷後嗣實獲救援之幸揮毫如意助善成功大悲大願乃武乃文輔翼正法普度眞君致心皈命禮文昌紀錄桂籍仙官假詩酒以娛情培桃李而悟道一門好善處處喜逢春風廿載啟䝉人人欣沾時雨身居城市心寄烟霞惡趨炎以就逢迎守淸貧而安淡泊書中尋理常拾字以遂珍重之懷妙處求玄恒救難而廣慈悲之念先型可則後世克昌大悲大願大聖大慈靈寶消劫濟世眞君致心皈命禮功佐普化力勸同緣曾贊金針以繡鴛鴦屢吹玉笛而引鸞鳳詩書傳家聲以不墜規矩守祖武以克繩忠厚居心孝友遺後時當未劫欲究聖學之淵源運值下元司參神化之旨趣玉虛簡命金闕綸音大悲大願大聖大慈上清無爲清靜眞人致心皈命禮先天無上道托土答大天王輔金闕以降魔佐玉皇而除崇位在三十六天之上功超億千萬劫之中道法靡窮神威難擬奉上帝之勒旨助內相之奇功護衛尊經巡查上界大悲大願至聖至神大梵天王托土答大法天尊致心皈命禮降魔䕶道衛法傳經驅不正之鬼神現無爲之色相顯靈應於西土誓度眾生除妖氛於東方力扶大道婆娑世界普冀皈依般若法門咸期頂禮不問善男信女祗希向道囘心無願不從有求皆應大悲大願大聖大慈韋陀尊者淸微䕶法天尊致心皈命禮德本注生職司延壽移星轉斗於天上化凶作吉於人間禀火德而養丹臺功成九轉掌離宫以住南極位葢三千執瑤池之聚仙旗領金闕之救劫旨同設宣講共議團圓大悲大願大聖大慈南極長生大帝延壽益算天尊致心皈命禮聖門勇士泗水英賢欣欣然動浮海之思行行如副升堂之望雄冠劍佩英氣畢露於一堂絕糧問津大道常困於列國春秋配享唐宋追封超仙佛以爲尊同天地而不朽延康浩劫三教同悲清微尊經諸天共讚奉聖旨以臨壇䕶玉虛而闡敎神功廣播惠澤旁敷大悲大願大聖大慈先賢仲氏夫子輔儒衛道天尊致心皈命禮啟請騫林夏元帥東宫䕶法上将軍手執鋼鞭降鬼祟身披金甲顯威靈或歸雷部巡世界時領符命入幽冥十八獄中常救苦釋放囹圄諸罪魂降魔䕶道功勞大囘生起死救良民若有不順吾道者先斬後奏報知聞尊經衛法奉敕令特鎭南方斬妖精微臣有請望來臨大賜雷威加擁䕶致心皈命禮啟請桂宮主帥将催生保産高将軍粉面銀盔朿玉帶少年英武捕邪精左提鐵棒如雲掃右捧麟兒降善門一切邪魔並外道收捉纖毫不容情天醫輔佐功彌大飛符治病頃刻臨曾奉元皇親敕令䕶衛玉虛註尊經臣今有請望來臨大賜神威加擁䕶致心皈命禮啟請北方捉邪将風輪盪鬼周将軍面如藍靛硃砂髮銀牙巨目捕妖精兩隻金鞭提在手音聲響處如雷霆三界魔王俱喪膽諸般鬼祟盡滅形曾受玄帝親法旨飛鸞顯應衛尊經臣今啟請降來臨大賜神威加擁䕶致心皈命禮啟請協天伏魔将持刀周帥大将軍黑面虬鬚如環眼英雄忠義蓋三分時隨伴駕朝金闕每借飛鸞顯威靈救劫侍帝心力苦雲程日夜不留停註解尊經承敕命鎭守西南除妖氛臣今有請望來臨大賜神威加擁䕶致心皈命禮啟請上元唐元帥紫微首将冠三天寶劍揮時羣鬼畏邪祟有誰敢近前三十六罡稱上将常降福祉在人間上天入地頃刻際糾功察過本無偏上界時時衛正道統領天兵萬萬千內相解經闡玄妙西方鎭攝最森嚴臣今啟請望來臨大賜雷威加擁䕶志心皈命禮啟請淸虛葛元帥中元二品大将軍龍眉騼唇並豹眼皂袍鐵棒鬼神驚白都宮裏時侍衛統領三千眾陰兵鬼祟妖邪同外道搜捕捉縳入幽冥治病驅邪如雲捲飛鸞降筆救黎民東北䕶道功勞大喜動玉皇與三淸敕令冥邦拷鬼魅救劫處處䕶生靈臣今啟請望來臨大賜神威加擁䕶致心皈命禮啟請洞陰周元帥水府浪苑顯神通北魁玄範泉曲鬼聞名喪膽滅形踪巨口朱髮銀牙露鐵盔鐵甲逞威風手執戈矛巡下界蝦兵蟹將排西東江湖淮濟捉水鬼浪靜波平樹奇功顯應西北曾勞駕尊經䕶法氣豪雄微臣有請望來臨大賜神威加擁䕶致心皈命禮三淸眾聖四府萬靈䕶法無數神祇衛經有感聖眾五方五帝之侶四隅四季之神二十四炁七十二侯水火金木五行主者乾坎艮震八卦神君城隍社令里域眞官某宅香火三敎福神斗法壇啟教列位師尊接禮師恭望洪慈鸞輿早降云讚舉太上說法時琳琅響玉音道高龍虎伏德重鬼神欽羣魔皆拱手三界共傾心臣今虔諷頌功德等上淸大聖開函演奧天尊三合香烟遍法界萬聖齊降臨俯伏金階下禮拜表眞誠夫此香者靈檀馥郁瑞氣氤氳頃刻遍滿十方須臾感通三界渾結禎祥之字普迓淸靜之眞稽首眾聖前心香前焚獻蠟炬燄輝煌幽微共睹光照徹三界內諸聖降壇場夫此燭者光同日月彩耀乾坤華房玄苑之間烺烺炳炳丹臺紫府之內色色空空金闕放大光明玉京鑒諸功德稽首眾眞前寶炬虔呈獻心花疊疊冠羣英錦繡馨香瑞色凝無根之樹誰能識元始天王道自成花光爛熳花色芬芳花隨四季吐奇葩花放滿圓爭春色蓮花朶朶須知火裡栽培性花層層當職鼎中灌溉今逢其會意花開敢向金闕而上獻一盞明燈分九巵乾坤大地燭無遺何人度遍三千界大道流傳已有時燈光遠照燈蕊頻開燈火朗徹於昏衢燈座輝煌於長夜燈影灼灼遥映三界十方燈燄重重普供千眞萬聖茲點不夜之明燈願燭無遺之法界華池神水本先天灌溉勿忘功自全子午相冲須既濟河車搬運入丹田臣聞水者生居五行之先位列八卦之次德雖至柔能載慈舟而濟世性即就下可納寶鼎以滋生欲滌身心之愆尤當賴淸靜之神水道果熟時功已成陰陽合德見天根栽培厯數三千劫摘取離宫獻玉京臣聞果者瑤池獻瑞橘井流香賴主人栽培之功仗園丁灌溉之力猿猴欲竊防護彌周盜賊思偷衛守愈固三千年成熟之候二六時供獻之辰敢摘取以陳天階希恩惠而降凡宇茗茶獻金鐺瑞氣滿壇場消除煩惱障皈命禮法王伏聞茶者古稱瑞草俗號靈芽淸風生七碗之甌幽香馥滿座之客敬獻黃金闕內虔陳白玉京中恭望天慈俯乘納受火齋水泉麯蘖香造成酒醴味非常凡人欲赴羣仙宴須獻金巵禮玉皇伏聞酒者金瓶撲鼻玉牢流香岳陽醉無上之眞仙淨慈飲不滅之佛子瑤池頻開大會金闕屢賜瓊漿凡情籍此以投誠聖眞臨軒而鑒悃恭望天慈俯乘納受天地精英萃玉華奇珍異寶眾爭誇不貪不吝方爲貴敬獻瑤臺種善芽竊以海錯山珍悉稟乾坤之氣物華天寶俱含宇宙之靈功鎭山河光燦日月假陰陽之造化借水火以陶鎔恭望天慈允納素悃玉淸留下一蒼胡太極結成黍米珠靜裏包涵無數義先天先地實虛無竊以合浦流輝燦爛得天地之靈氣芳函㪚彩精華現宇宙之奇文索還於鄭市之中探取於龍頷之下精光奪目雅色宜人恭望天慈允納素悃靈文蘊奧本先天太極虛涵大道全三十六符能測透玄玄妙妙妙玄玄恭維鴻鈞闡奥無極渾含乎陰陽元始談經黍米包羅乎天地金科玉匱之符篆實寓天機淸微靈寶之秘文原藏大道今皈依而上獻願頂禮以不忘八卦霓裳萬象包無無有有靜中醮天開景運皇圖固補綴乾坤不憚勞恭維金針刺繡雲衣成功頻𣷹錦上之花虛涵玄中之妙纖纖女手織就絢爛之文楚楚衣裳包羅乾坤之義今叩金闕而敬陳惟祈天顏之洞鑒臣今東向請願聖共臨軒十方三界眾頃刻降瑤壇以今啟請行道巳遂周隆謹具請經疏文恭爲宣讀云云三天門下拜進疏文一函上詣三淸司經宫呈臣進等囘壇同聲讚詠道從太極鎭玄綱道判三才列五常經乃鍊金成鳳篆經能揉玉寫龍章師乘白鶴威神奕師駕靑牛意氣揚寶鼎芬芳陳寶座寶香𣺌𣺌透穹蒼大聖三淸應化天尊所謂道天上金科傳宇宙雲端捧出玉函來尊經談演功無量大道頻敷景色開正法得遇讚莫能窮恭對瑤臺皈依頂禮第一皈依無上道寶玉淸聖境元始天尊第二皈依無上經寶上淸眞境靈寶天尊第三皈依無上師寶太淸仙境降生天尊皈依已竟謹當發願一願乾坤交泰二願邦國安甯三願皇王有道四願五穀豐盈五願刀兵不起六願人物咸亨七願劫難消散八願水火不興九願求道得遇十願名列仙眞十一願百靈拱服十二願萬物沾恩發願已周次當禮謝致心禮謝三淸應化天尊金闕玉皇天尊十方無極天尊三淸䕶法天尊四府眾位神祇經筵有感眞仙恭望洪慈鑒此微忱禮請功德上奉羣眞諷演誥章普安神位致心皈命禮惟三聖人乃一太極昔受浩劫家之命鼎膺無量品之褒紫微淸虛洞陰總領功過賜福赦罪解厄溥濟存亡道冠諸天恩覃三界大悲大願大聖大慈三元三品三官大帝三宮九府三百六十感應天尊向來啟經法事已合周完楮財大會恭對寶壇用憑火化致心稱念大聖談經演教天尊大聖開函演奧天尊不可思議功德太上無極大道三十六部尊經啟請科儀終
